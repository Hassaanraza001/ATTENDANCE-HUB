<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSync Setup Mode</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #020617;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217, 91%, 60%, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(16, 100%, 50%, 0.04) 0px, transparent 50%);
        }
        .container {
            padding: 50px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-radius: 50px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            max-width: 85%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 4.5rem;
            margin: 0;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -3px;
        }
        .highlight { color: var(--primary); }
        .status-badge {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
            padding: 8px 24px;
            border-radius: 100px;
            font-weight: 900;
            font-size: 1.2rem;
            border: 1px solid rgba(244, 63, 94, 0.2);
            margin: 20px 0;
            display: inline-block;
            letter-spacing: 2px;
        }
        .qr-container {
            width: 280px;
            height: 280px;
            background: white;
            margin: 30px auto;
            padding: 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
        }
        .instruction-box {
            background: rgba(59, 130, 246, 0.05);
            padding: 25px 40px;
            border-radius: 30px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            margin-top: 30px;
            text-align: left;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .step-num {
            background: var(--primary);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .blink { animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        svg.qr-code {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

    <div class="container">
        <h1>BioSync <span class="highlight">Box</span></h1>
        <div class="status-badge">OFFLINE MODE</div>
        
        <p style="font-size: 1.4rem; color: #94a3b8; margin-top: 0;">Internet connection not detected.</p>

            </svg>
        </div>

        <div class="instruction-box">
            <div class="step">
                <div class="step-num">1</div> 
                <span>Scan QR code to connect to <span class="highlight">BioSync_Setup</span></span>
            </div>
            <div class="step">
                <div class="step-num">2</div> 
                <span>Wait for the setup page to pop up on your phone</span>
            </div>
            <div class="step">
                <div class="step-num">3</div> 
                <span>Select school Wi-Fi and enter password</span>
            </div>
        </div>

        <p class="blink" style="font-size: 1.1rem; margin-top: 40px; color: var(--primary); font-weight: 900; text-transform: uppercase;">
            Waiting for configuration...
        </p>
    </div>
</body>
</html>
