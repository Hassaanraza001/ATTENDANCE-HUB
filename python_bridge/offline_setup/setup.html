
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSync Wi-Fi Setup</title>
    <style>
        :root { --primary: #3b82f6; --bg: #020617; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { width: 100%; max-width: 400px; background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-style: italic; font-weight: 900; letter-spacing: -2px; margin-bottom: 5px; }
        .wifi-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .wifi-item { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid transparent; transition: 0.2s; }
        .wifi-item:hover { border-color: var(--primary); }
        input { width: 100%; padding: 15px; background: #020617; border: 1px solid #1e293b; border-radius: 12px; color: white; margin-top: 15px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .status { margin-top: 15px; text-align: center; color: var(--primary); font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>BioSync <span style="color: var(--primary)">Box</span></h1>
        <p style="color: #64748b;">Select School/College Wi-Fi</p>
        
        <div id="list-view">
            <div class="wifi-list" id="wifi-list">
                <p>Scanning for networks...</p>
            </div>
        </div>

        <div id="pass-view" style="display: none;">
            <p id="target-ssid" style="font-weight: bold; color: var(--primary);"></p>
            <input type="password" id="wifi-pass" placeholder="Enter Wi-Fi Password">
            <button class="btn" onclick="connect()">CONNECT NOW</button>
            <button class="btn" style="background: transparent; border: 1px solid #1e293b;" onclick="showList()">BACK</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        let selectedSSID = "";

        async function fetchWifi() {
            try {
                const res = await fetch('/api/wifi-list');
                const list = await res.json();
                const container = document.getElementById('wifi-list');
                container.innerHTML = '';
                if(list.length === 0) container.innerHTML = '<p>No networks found. Retrying...</p>';
                list.forEach(n => {
                    const div = document.createElement('div');
                    div.className = 'wifi-item';
                    div.innerHTML = `<span>${n.ssid}</span> <span style="opacity: 0.5">${n.signal}%</span>`;
                    div.onclick = () => selectWifi(n.ssid);
                    container.appendChild(div);
                });
            } catch(e) { console.log(e); }
        }

        function selectWifi(ssid) {
            selectedSSID = ssid;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('pass-view').style.display = 'block';
            document.getElementById('target-ssid').innerText = "Connecting to: " + ssid;
        }

        function showList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('pass-view').style.display = 'none';
        }

        async function connect() {
            const pass = document.getElementById('wifi-pass').value;
            if(!pass) return alert("Please enter password");
            
            document.getElementById('status').innerText = "Connecting... Box will reboot.";
            try {
                await fetch('/api/connect', {
                    method: 'POST',
                    body: JSON.stringify({ ssid: selectedSSID, password: pass })
                });
            } catch(e) {}
        }

        fetchWifi();
        setInterval(fetchWifi, 10000);
    </script>
</body>
</html>
